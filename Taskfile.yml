version: '3'

tasks:
  default:
    cmds:
      - task: up

  up:
    desc: Запустить проект
    cmds:
      - docker compose up -d --build

  down:
    desc: Остановить проект
    cmds:
      - docker compose down

  restart:
    desc: Перезапустить проект
    cmds:
      - task: down
      - task: up

  artisan:
    desc: Запустить artisan команду (полное название)
    cmds:
      - sh -c 'docker compose exec app php artisan {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}list{{end}}'

  # ==================== Миграции ====================
  migrate:
    desc: Запустить миграции
    cmds:
      - task: artisan
        vars:
          CLI_ARGS: migrate

  migrate:fresh:
    desc: Пересоздать все таблицы + сиды
    cmds:
      - task: artisan
        vars:
          CLI_ARGS: "migrate:fresh --seed"

  migrate:rollback:
    desc: Откатить миграцию
    cmds:
      - task: artisan
        vars:
          CLI_ARGS: migrate:rollback

  # ==================== IDE Helper ====================
  ide-helper:generate:
    desc: Сгенерировать _ide_helper.php
    cmds:
      - task: artisan
        vars:
          CLI_ARGS: ide-helper:generate

  ide-helper:models:write:
    desc: Записать phpDoc для моделей
    cmds:
      - task: artisan
        vars:
          CLI_ARGS: "ide-helper:models --write"

  ide-helper:all:
    desc: Полная генерация IDE helpers
    cmds:
      - task: ide-helper:generate
      - task: ide-helper:models:write

  # ==================== Другие ====================
  seed:
    desc: Запустить сидеры
    cmds:
      - task: artisan
        vars:
          CLI_ARGS: db:seed

  fresh:
    desc: Полная очистка + миграции
    cmds:
      - task: down
      - task: up
      - task: migrate:fresh

  composer:
    desc: Composer команды
    cmds:
      - docker compose exec app composer {{.CLI_ARGS}}

  logs:
    desc: Логи приложения
    cmds:
      - docker compose logs app --tail=100

  logs:caddy:
    desc: Логи Caddy
    cmds:
      - docker compose logs caddy --tail=100

  # Code Quality
  cs:
    desc: PHP CS Fixer — исправить код
    cmds:
      - ./vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --using-cache=no --verbose

  cs:dry:
    desc: PHP CS Fixer — проверить без изменений
    cmds:
      - ./vendor/bin/php-cs-fixer fix --config=.php-cs-fixer.php --using-cache=no --dry-run --verbose
