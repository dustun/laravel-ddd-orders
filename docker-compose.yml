version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ddd-orders-app
    volumes:
      - .:/var/www/html
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: ddd-orders-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ddd_orders
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
