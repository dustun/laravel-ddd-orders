version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ddd-orders-app
    volumes:
      - .:/var/www/html
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: ddd-orders-db
    environment:
      POSTGRES_DB: ddd_orders
      POSTGRES_USER: ddd_user
      POSTGRES_PASSWORD: ddd_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
